# See https://www.chasefinch.com/nitpick-style.toml

[docformatter]
wrap-descriptions = 79

[mypy]
disallow_subclassing_any = False
exclude = (?x)(
    ^manage\.py$
    | ^build/
    | ^include/
    | ^lib/
    | ^bin/)
follow_imports = normal
ignore_missing_imports = true
disable_error_code = var-annotated, import-untyped, has-type

[flake8]
select = WPS
extend-exclude =
	bin, lib, node_modules,
	.git, .ebextensions, .elasticbeanstalk, .platform
filename = *.py
nested-classes-whitelist = Meta, Params, Config, Media

allowed-domain-names = id, id_, pk, i, q, db, s3, ui, js, ip, of, by, ad, handle, objects, value, values, result, results, item, items, param, params, arg, args, x, y, z, dx, dy, dz, x1, x2, x3, y1, y2, y3, z1, z2, z3
forbidden-domain-names = index, err, foo, bar, baz, quux, foobar, klass, idx, buf, exc, con, conn, db_conn, req, res, resp, cur, col, pos, sep, fmt, dt

allowed-module-metadata = __all__

ignore = WPS300, WPS475

extend-ignore =
	# Logic in __init__ for rust & mypyc extensions
	WPS412,
	# Complexity rules
	WPS2,
	# NOQA comment limits. We need them for enums.
	WPS402,
	# Underscored number pattern; We prefer the opposite
	WPS114

per_file_ignores =
	# Ignore long names for test functions
	tests/*: WPS118

multiline-quotes = """
